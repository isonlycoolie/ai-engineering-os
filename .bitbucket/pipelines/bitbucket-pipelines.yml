# Bitbucket Pipelines stub - see standards/git-workflow.md
image: node:20-alpine

definitions:
  caches:
    node: node_modules
  steps:
    - step: &lint
        name: Lint
        caches: [node]
        script:
          - npm ci
          - npm run lint || echo "Configure lint"
    - step: &test
        name: Test
        caches: [node]
        script:
          - npm ci
          - npm test || echo "Configure tests"
    - step: &commit-size
        name: Commit size check
        image: alpine/git
        script:
          - echo "Enforce 150-line commits per standards/git-commit-discipline.md"

pipelines:
  pull-requests:
    '**':
      - parallel:
          - step: *lint
          - step: *commit-size
      - step: *test
  branches:
    develop:
      - step: *lint
      - step: *test
    main:
      - step: *lint
      - step: *test
