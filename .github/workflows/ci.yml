
  pr-size:
    name: PR size check (400 lines)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce PR size limit
        run: |
          set -euo pipefail
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          STAT=$(git diff --stat "$BASE"..HEAD \
            -- ':!package-lock.json' ':!yarn.lock' ':!*.lock' ':!**/migrations/*' | tail -1)
          INS=$(echo "$STAT" | grep -oE '[0-9]+ insertion' | awk '{s+=$1} END {print s+0}')
          DEL=$(echo "$STAT" | grep -oE '[0-9]+ deletion' | awk '{s+=$1} END {print s+0}')
          TOTAL=$((INS + DEL))
          echo "Total PR change: $TOTAL lines"
          [ "$TOTAL" -le 400 ] || { echo "FAIL: PR exceeds 400 lines"; exit 1; }

  registry-build:
    name: Build static registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/build-registry.py
      - name: Verify registry.json
        run: |
          test -f registry/dist/registry.json
          python -c "import json; r=json.load(open('registry/dist/registry.json')); assert len(r['assets'])>=40; assert 'frontend' in r['profiles']"

  # Re-enable mcp-server-build when mcp-server/ is tracked in the repo.

  markdown-lint:
    name: Markdown lint (placeholder)
    runs-on: ubuntu-latest
    needs: [prompt-contract, registry-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint placeholder
        run: |
          echo "Markdown lint placeholder. Wire markdownlint-cli when ready."
          echo "Suggested: npm install -g markdownlint-cli && markdownlint '**/*.md' --ignore node_modules"
