# Local development compose pattern
#
# Usage: docker compose -f docker/compose/dev-compose.yml up --build
#
# Replace image names, build contexts, and environment values with your services.

name: ai-engineering-os-dev

services:
  api:
    build:
      context: ../..
      dockerfile: docker/node-base/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgres://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Mount source for hot reload in dev (remove in prod-like testing)
      - ../../:/app:cached
    networks:
      - backend

  worker:
    build:
      context: ../..
      dockerfile: docker/python-base/Dockerfile
    environment:
      APP_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgres://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
