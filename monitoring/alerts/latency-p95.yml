# Latency p95 alert templates
#
# Alert when tail latency exceeds SLO. Use histogram buckets (Prometheus)
# or native percentile metrics (Datadog, CloudWatch).

alerts:
  - name: latency_p95_critical
    severity: critical
    description: |
      {{ $labels.service }} p95 latency exceeds 1s for 10 minutes.
      Check downstream dependencies, DB query plans, and resource saturation.
    runbook: https://github.com/org/runbooks/blob/main/high-latency.md
    for: 10m
    labels:
      team: oncall
      slo: latency
    annotations:
      summary: "Critical p95 latency on {{ $labels.service }}"
    expr: |
      histogram_quantile(
        0.95,
        sum(rate(http_request_duration_seconds_bucket{service="$SERVICE"}[5m])) by (le, service)
      ) > 1.0

  - name: latency_p95_warning
    severity: warning
    description: |
      {{ $labels.service }} p95 latency exceeds 500ms SLO target.
    runbook: https://github.com/org/runbooks/blob/main/high-latency.md
    for: 15m
    labels:
      team: oncall
      slo: latency
    annotations:
      summary: "Elevated p95 latency on {{ $labels.service }}"
    expr: |
      histogram_quantile(
        0.95,
        sum(rate(http_request_duration_seconds_bucket{service="$SERVICE"}[5m])) by (le, service)
      ) > 0.5

  - name: latency_p95_by_route
    severity: warning
    description: |
      Route {{ $labels.route }} p95 latency exceeds 750ms.
    for: 10m
    labels:
      team: oncall
    annotations:
      summary: "Slow route: {{ $labels.method }} {{ $labels.route }}"
    expr: |
      histogram_quantile(
        0.95,
        sum(rate(http_request_duration_seconds_bucket{service="$SERVICE"}[5m])) by (le, service, method, route)
      ) > 0.75

# Datadog equivalent (reference):
# query: "avg(last_15m):p95:trace.http.request.duration{service:$SERVICE} > 0.5"
