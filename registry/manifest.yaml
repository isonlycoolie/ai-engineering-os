# Curated asset manifest for AI Engineering OS registry
# Used by scripts/build-registry.py and mcp-server resolver

version: "1.1.0"

assets:
  # Shared (all tracks)
  - id: global-system-prompt
    path: prompts/global-system-prompt.md
    track: shared
    taskTypes: [implement, review, security, deploy, debug, clarify]
    dependsOn: []

  - id: project-context
    path: templates/project-context.md
    track: shared
    taskTypes: [implement, review, security, deploy, debug, clarify]
    dependsOn: []

  - id: prompting-rules
    path: ai-collaboration/prompting-rules.md
    track: shared
    taskTypes: [implement, clarify]
    dependsOn: []

  - id: human-review-checklist
    path: ai-collaboration/human-review-checklist.md
    track: shared
    taskTypes: [implement, review]
    dependsOn: []

  - id: context-packing-guide
    path: ai-collaboration/context-packing-guide.md
    track: shared
    taskTypes: [implement]
    dependsOn: [project-context]

  - id: git-commit-discipline
    path: standards/git-commit-discipline.md
    track: shared
    taskTypes: [implement, review]
    dependsOn: []

  - id: git-branch-discipline
    path: standards/git-branch-discipline.md
    track: shared
    taskTypes: [implement]
    dependsOn: []

  - id: pull-request
    path: standards/pull-request.md
    track: shared
    taskTypes: [implement, review]
    dependsOn: []

  - id: git-workflow
    path: standards/git-workflow.md
    track: shared
    taskTypes: [implement]
    dependsOn: [git-commit-discipline, git-branch-discipline, pull-request]

  - id: standards.security
    path: standards/security.md
    track: shared
    taskTypes: [implement, security, review]
    dependsOn: []

  - id: standards.testing
    path: standards/testing.md
    track: shared
    taskTypes: [implement, review]
    dependsOn: []

  # Global prompts
  - id: ambiguity-resolution
    path: prompts/ambiguity-resolution-prompt.md
    track: shared
    taskTypes: [clarify]
    stage: 1
    dependsOn: [global-system-prompt, project-context]

  - id: architecture-prompt
    path: prompts/architecture-prompt.md
    track: shared
    taskTypes: [clarify, implement]
    stage: 2
    dependsOn: [global-system-prompt]

  - id: code-review-prompt
    path: prompts/code-review-prompt.md
    track: shared
    taskTypes: [review]
    dependsOn: [global-system-prompt]

  - id: debugging-prompt
    path: prompts/debugging-prompt.md
    track: shared
    taskTypes: [debug]
    dependsOn: [global-system-prompt, project-context]

  - id: refactor-prompt
    path: prompts/refactor-prompt.md
    track: shared
    taskTypes: [refactor]
    dependsOn: [global-system-prompt, git-commit-discipline]

  # Frontend track
  - id: path.frontend
    path: docs/paths/frontend-only.md
    track: frontend
    taskTypes: [implement]
    dependsOn: []

  - id: frontend-engineer.role
    path: agents/frontend-engineer/role.md
    track: frontend
    taskTypes: [implement, review]
    dependsOn: []

  - id: frontend-engineer.primary
    path: agents/frontend-engineer/prompts/primary.md
    track: frontend
    taskTypes: [implement]
    stage: 4
    dependsOn: [global-system-prompt, standards.frontend, project-context]

  - id: frontend-engineer.review
    path: agents/frontend-engineer/prompts/review.md
    track: frontend
    taskTypes: [review]
    dependsOn: [global-system-prompt, standards.frontend]

  - id: frontend-engineer.checklist
    path: agents/frontend-engineer/checklists/pre-delivery.md
    track: frontend
    taskTypes: [implement, review]
    dependsOn: []

  - id: standards.frontend
    path: standards/frontend.md
    track: frontend
    taskTypes: [implement, review]
    dependsOn: []

  # Backend track
  - id: path.backend
    path: docs/paths/backend-only.md
    track: backend
    taskTypes: [implement]
    dependsOn: []

  - id: backend-engineer.role
    path: agents/backend-engineer/role.md
    track: backend
    taskTypes: [implement, review]
    dependsOn: []

  - id: backend-engineer.primary
    path: agents/backend-engineer/prompts/primary.md
    track: backend
    taskTypes: [implement]
    stage: 4
    dependsOn: [global-system-prompt, standards.api, standards.database, project-context]

  - id: backend-engineer.review
    path: agents/backend-engineer/prompts/review.md
    track: backend
    taskTypes: [review]
    dependsOn: [global-system-prompt, standards.api]

  - id: backend-engineer.checklist
    path: agents/backend-engineer/checklists/pre-delivery.md
    track: backend
    taskTypes: [implement, review]
    dependsOn: []

  - id: standards.api
    path: standards/api.md
    track: backend
    taskTypes: [implement, review]
    dependsOn: []

  - id: standards.database
    path: standards/database.md
    track: backend
    taskTypes: [implement]
    dependsOn: []

  # Fullstack additions
  - id: path.fullstack
    path: docs/paths/full-stack.md
    track: fullstack
    taskTypes: [implement]
    dependsOn: []

  # QA
  - id: qa-engineer.primary
    path: agents/qa-engineer/prompts/primary.md
    track: shared
    taskTypes: [test]
