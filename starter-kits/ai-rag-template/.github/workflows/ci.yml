name: ai-rag-template CI

on:
  push:
    paths:
      - "starter-kits/ai-rag-template/**"
  pull_request:
    paths:
      - "starter-kits/ai-rag-template/**"

concurrency:
  group: rag-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-kits/ai-rag-template

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: starter-kits/ai-rag-template/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q --cov=src --cov-report=term-missing

      - name: Lint (placeholder)
        run: echo "Wire ruff or flake8 when ready - see AI Engineering OS standards."
