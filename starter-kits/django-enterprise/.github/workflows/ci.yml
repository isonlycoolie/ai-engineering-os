name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-security:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: django
          POSTGRES_PASSWORD: django
          POSTGRES_DB: django_enterprise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django -d django_enterprise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost
      DATABASE_URL: postgres://django:django@localhost:5432/django_enterprise
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      SERVICE_NAME: django-enterprise

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Test
        run: pytest -q

      - name: Security scan
        run: bandit -r api config tasks -ll
