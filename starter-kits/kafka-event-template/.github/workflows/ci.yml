name: kafka-event-template CI

on:
  push:
    paths:
      - "starter-kits/kafka-event-template/**"
  pull_request:
    paths:
      - "starter-kits/kafka-event-template/**"

concurrency:
  group: kafka-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-kits/kafka-event-template

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: starter-kits/kafka-event-template/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q --cov=src --cov-report=term-missing

      - name: Lint (placeholder)
        run: echo "Wire ruff or flake8 when ready - see AI Engineering OS standards."

  integration:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: starter-kits/kafka-event-template

    steps:
      - uses: actions/checkout@v4

      - name: Start Kafka
        run: docker compose -f docker/docker-compose.yml up -d kafka

      - name: Wait for Kafka
        run: |
          for i in $(seq 1 30); do
            docker compose -f docker/docker-compose.yml exec -T kafka \
              /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 && exit 0
            sleep 5
          done
          exit 1

      - name: Kafka integration placeholder
        run: |
          echo "Kafka is healthy - wire confluent-kafka integration tests here."
          docker compose -f docker/docker-compose.yml down
