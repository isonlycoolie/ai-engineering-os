name: CI
on:
  push:
    paths: ["starter-kits/microservice-template/**"]
  pull_request:
    paths: ["starter-kits/microservice-template/**"]
defaults:
  run:
    working-directory: starter-kits/microservice-template
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: starter-kits/microservice-template/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
