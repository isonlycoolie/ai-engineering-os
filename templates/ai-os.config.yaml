# AI Engineering OS project manifest
# Copy to your project root as ai-os.config.yaml (or generate via install-ai-os script)

version: "1.1"

# Track determines default path docs and which agents are primary
# Values: frontend | backend | fullstack
track: fullstack

# Where OS rules live in this project (after install)
os_path: .ai-os

# Optional: path to this repo if using reference model (submodule or sibling clone)
os_reference: null

# Optional: remote static registry URL (Render CDN). Used when os_path is missing.
# os_registry_url: https://ai-engineering-os.onrender.com

# Optional capabilities (include optional assets via MCP)
capabilities:
  deploy: false
  docs: false
  architecture: false

# Default agents by track (override per task if needed)
agents:
  frontend:
    primary: agents/frontend-engineer/prompts/primary.md
    checklist: agents/frontend-engineer/checklists/pre-delivery.md
  backend:
    primary: agents/backend-engineer/prompts/primary.md
    checklist: agents/backend-engineer/checklists/pre-delivery.md
  qa:
    primary: agents/qa-engineer/prompts/primary.md
    checklist: agents/qa-engineer/checklists/pre-release.md
  security:
    primary: workflows/prompts/stage-05-security-review.md
  architecture:
    primary: agents/architecture-engineer/prompts/primary.md

# Git discipline (v1.1)
git:
  integration_branch: develop
  production_branch: main
  max_commit_lines: 150
  max_pr_lines: 400
  branch_pattern: "{type}/{ticket}-{description}"

# Standards paths (relative to os_path or project root)
standards:
  api: standards/api.md
  security: standards/security.md
  testing: standards/testing.md
  frontend: standards/frontend.md
  git: standards/git-workflow.md
